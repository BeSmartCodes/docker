services:
  - type: web
    name: smartlivecam-web
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartlivecam-postgres
          property: connectionString
      - key: CALENDSO_ENCRYPTION_KEY
        generateValue: true
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: CRON_API_KEY
        generateValue: true

databases:
  - name: smartlivecam-postgres
    plan: basic-1gb
